<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✓ My Todo List</h1>
        
        <div class="input-group">
            <input 
                type="text" 
                id="input" 
                placeholder="Add a new task..."
            >
            <button id="add">Add</button>
        </div>
        
        <ul id="todo-list"></ul>
        <div id="empty-message" class="empty-message">No tasks yet. Add one to get started!</div>
    </div>
</body>
<script src="script.js"></script>
</html>
